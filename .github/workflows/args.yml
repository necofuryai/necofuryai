name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&count_private=true&show_icons=true&custom_title=GitHub Stats&hide_border=true&theme=tokyonight
          path: profile/stats.svg
          token: ${{ secrets.README_STATS }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "72294870+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push